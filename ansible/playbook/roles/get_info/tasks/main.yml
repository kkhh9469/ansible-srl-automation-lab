---

- name: Get int info
  nokia.srlinux.get:
    paths:
      - path: "/interface[name={{ item.name }}]"
  register: int_state
  loop: "{{ interfaces }}"

- name: Add IPv4 info
  ansible.builtin.set_fact:
     ipv4: "{{ ipv4 | default([]) + \
      ['int: ' + item.item.name + '.' + (item.result[0].subinterface[0]['index'] | string) + ' / ' + \
      'ipv4: ' + item.result[0].subinterface[0].ipv4.address[0]['ip-prefix']] }}" 
  loop: "{{ int_state.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: Get loopback info
  nokia.srlinux.get:
    paths:
      - path: "/interface[name=system0]"
  register: loopback_state

- name: Add loopback info
  ansible.builtin.set_fact:
    loopback: "{{ loopback | default([]) \
     + ['loopback: ' + 'system0.0' + ' / ' \
     + 'ipv4: ' + loopback_state.result[0].subinterface[0].ipv4.address[0]['ip-prefix']] }}"

- name: get ospf info
  nokia.srlinux.get:
    paths:
      - path: "/network-instance[name=default]/protocols/ospf/instance[name=default]"
  register: ospf

- name: Summary OSPF Neighbors into one list
  ansible.builtin.set_fact:
    ospf_summary: >-
      {% set neighbors = [] %}
      {% for area in ospf.result[0].area | default([]) %}
        {% for interface in area.interface | default([]) %}
          {% if interface.neighbor is defined %}
            {% for nbr in interface.neighbor %}
              {% set clean_state = nbr['adjacency-state'].split(':') | last %}
              {% set _ = neighbors.append(
                'Area: ' + (area['area-id'] | string) +
                ' / Int: ' + interface['interface-name'] +
                ' / RID: ' + nbr['router-id'] +
                ' / State: ' + clean_state
              ) %}
            {% endfor %}
          {% else %}
            {% set _ = neighbors.append(
              'Area: ' + (area['area-id'] | string) +
              ' / Int: ' + interface['interface-name'] +
              ' / State: No Neighbor'
            ) %}
          {% endif %}
        {% endfor %}
      {% endfor %}
      {{ neighbors | to_json }}

- name: Make dir
  ansible.builtin.file:
    path: "./reports"
    state: directory
    mode: '0775'
  delegate_to: localhost
  run_once: true

- name: Save report to a file
  ansible.builtin.copy:
    content: |
      # loopback Status
      {% for item in loopback %}
      * {{ item }}
      {% endfor %}

      # Network Status
      {% for item in ipv4 %}
      * {{ item }}
      {% endfor %}

      # OSPF Status Report
      {% for item in ospf_summary | from_json %}
      * {{ item }}
      {% endfor %}

    dest: "./reports/report_{{ inventory_hostname }}.md"
  delegate_to: localhost